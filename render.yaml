services:
  - type: web
    name: keheilan-demo
    runtime: docker
    plan: free
    region: frankfurt
    dockerfilePath: ./Dockerfile
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: PORT
        value: 8080
      - key: DATABASE_URL
        sync: false        # set manually to your Neon connection string
      - key: OPENROUTER_API_KEY
        sync: false        # set manually
      - key: SEARCH_API_KEY
        sync: false        # optional — leave unset to use offline stub
