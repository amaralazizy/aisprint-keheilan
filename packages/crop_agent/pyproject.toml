[project]
name = "crop_agent"
version = "0.1.0"
description = "Model 2 — agentic crop recommendation pipeline"
requires-python = ">=3.10"
dependencies = [
    "openai>=1.0",
    "python-dotenv>=1.0",
    "httpx>=0.25",
    "pydantic>=2.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["crop_agent"]
