[project]
name = "model1_land"
version = "0.1.0"
description = "Model 1 — fractional land asset platform"
requires-python = ">=3.10"
dependencies = [
    "fastapi>=0.110",
    "uvicorn[standard]>=0.27",
    "sqlmodel>=0.0.16",
    "jinja2>=3.1",
    "python-multipart>=0.0.9",
    "openai>=1.0",
    "python-dotenv>=1.0",
    "crop_agent",
    "itsdangerous>=2.0",
    "psycopg[binary]>=3.1",
]

[tool.uv.sources]
crop_agent = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["model1_land"]
