# Run `fly launch --no-deploy` to create the app, then `fly deploy`.
# Replace <APP_NAME> below with the name `fly launch` assigns.

app = "keheilan-demo"
primary_region = "fra"  # Frankfurt — closest free region to Egypt. Change if you prefer.

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"

[[mounts]]
  source = "keheilan_data"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"   # save free-tier hours when idle
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
